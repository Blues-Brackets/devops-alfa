                      "group": "prometheus",
                      "kind": "DataQuery",
                      "spec": {
                        "editorMode": "code",
                        "expr": "min (\n  kube_pod_container_resource_limits{\n    namespace=\"bluesbrackets\",\n    resource=\"cpu\",\n    container!=\"\",\n    pod=~\".*bluesbrackets.*\"\n  }\n)",
                        "instant": false,
                        "legendFormat": "{{pod}} limit",
                        "range": true
