apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaManifest
metadata:
  name: dashboard-app-overview
  namespace: observability
spec:
  instanceSelector:
    matchLabels:
      dashboards: "kube-prometheus-grafana"
  template:
    apiVersion: dashboard.grafana.app/v2beta1
    kind: Dashboard
    metadata:
      name: dashboard-app-overview
      namespace: observability
      annotations:
        grafana.app/folder: applications
    spec:
      annotations:
        - kind: AnnotationQuery
          spec:
            builtIn: true
            enable: true
            hide: true
            iconColor: rgba(0, 211, 255, 1)
            name: Annotations & Alerts
            query:
              datasource:
                name: '-- Grafana --'
              group: grafana
              kind: DataQuery
              spec: {}
              version: v0
      cursorSync: 'Off'
      editable: true
      elements:
        panel-1:
          kind: Panel
          spec:
            data:
              kind: QueryGroup
              spec:
                queries:
                  - kind: PanelQuery
                    spec:
                      hidden: false
                      query:
                        datasource:
                          name: prometheus
                        group: prometheus
                        kind: DataQuery
                        spec:
                          editorMode: code
                          expr: |-
                            sum by (code_bucket) (
                              label_replace(
                                rate(traefik_entrypoint_requests_total{entrypoint=~"(metrics|traefik|web|websecure)"}[$__interval]),
                                "code_bucket",
                                "${1}xx",
                                "code",
                                "([1-5])[0-9][0-9]"
                              )
                            )
                          interval: 1m
                          legendFormat: __auto
                          range: true
                        version: v0
                      refId: A
                queryOptions: {}
                transformations: []
            description: ''
            id: 1
            links: []
            title: Traffic RPM
            vizConfig:
              group: timeseries
              kind: VizConfig
              spec:
                fieldConfig:
                  defaults:
                    color:
                      mode: palette-classic
                    custom:
                      axisBorderShow: false
                      axisCenteredZero: false
                      axisColorMode: text
                      axisLabel: ''
                      axisPlacement: auto
                      barAlignment: 0
                      barWidthFactor: 0.6
                      drawStyle: line
                      fillOpacity: 0
                      gradientMode: none
                      hideFrom:
                        legend: false
                        tooltip: false
                        viz: false
                      insertNulls: false
                      lineInterpolation: linear
                      lineWidth: 1
                      pointSize: 5
                      scaleDistribution:
                        type: linear
                      showPoints: auto
                      showValues: false
                      spanNulls: false
                      stacking:
                        group: A
                        mode: none
                      thresholdsStyle:
                        mode: 'off'
                    thresholds:
                      mode: absolute
                      steps:
                        - color: green
                          value: 0
                        - color: red
                          value: 80
                  overrides: []
                options:
                  annotations:
                    clustering: -1
                    multiLane: false
                  legend:
                    calcs: []
                    displayMode: list
                    placement: bottom
                    showLegend: true
                  tooltip:
                    hideZeros: false
                    mode: single
                    sort: none
              version: 13.0.1+security-01
        panel-2:
          kind: Panel
          spec:
            data:
              kind: QueryGroup
              spec:
                queries:
                  - kind: PanelQuery
                    spec:
                      hidden: false
                      query:
                        datasource:
                          name: prometheus
                        group: prometheus
                        kind: DataQuery
                        spec:
                          editorMode: code
                          expr: |-
                            sum by (pod) (
                              rate(container_cpu_usage_seconds_total{
                                namespace="bluesbrackets",
                                container!="",
                                pod=~".*bluesbrackets.*"
                              }[$__rate_interval])
                            )
                          legendFormat: __auto
                          range: true
                        version: v0
                      refId: A
                  - kind: PanelQuery
                    spec:
                      hidden: false
                      query:
                        datasource:
                          name: prometheus
                        group: prometheus
                        kind: DataQuery
                        spec:
                          editorMode: code
                          expr: |-
                            min (
                              kube_pod_container_resource_limits{
                                namespace="bluesbrackets",
                                resource="cpu",
                                container!="",
                                pod=~".*bluesbrackets.*"
                              }
                            )
                          instant: false
                          legendFormat: '{{pod}} limit'
                          range: true
                        version: v0
                      refId: B
                  - kind: PanelQuery
                    spec:
                      hidden: false
                      query:
                        datasource:
                          name: prometheus
                        group: prometheus
                        kind: DataQuery
                        spec:
                          editorMode: code
                          expr: |-
                            min (
                              kube_pod_container_resource_requests{
                                namespace="bluesbrackets",
                                resource="cpu",
                                container!="",
                                pod=~".*bluesbrackets.*"
                              }
                            )
                          instant: false
                          legendFormat: '{{pod}} requests'
                          range: true
                        version: v0
                      refId: C
                queryOptions: {}
                transformations: []
            description: ''
            id: 2
            links: []
            title: CPU usage by pod
            vizConfig:
              group: timeseries
              kind: VizConfig
              spec:
                fieldConfig:
                  defaults:
                    color:
                      mode: palette-classic
                    custom:
                      axisBorderShow: false
                      axisCenteredZero: false
                      axisColorMode: text
                      axisLabel: ''
                      axisPlacement: auto
                      barAlignment: 0
                      barWidthFactor: 0.6
                      drawStyle: line
                      fillOpacity: 0
                      gradientMode: none
                      hideFrom:
                        legend: false
                        tooltip: false
                        viz: false
                      insertNulls: false
                      lineInterpolation: linear
                      lineWidth: 1
                      pointSize: 5
                      scaleDistribution:
                        type: linear
                      showPoints: auto
                      showValues: false
                      spanNulls: false
                      stacking:
                        group: A
                        mode: none
                      thresholdsStyle:
                        mode: 'off'
                    thresholds:
                      mode: absolute
                      steps:
                        - color: green
                          value: 0
                        - color: red
                          value: 80
                  overrides: []
                options:
                  annotations:
                    clustering: -1
                    multiLane: false
                  legend:
                    calcs: []
                    displayMode: list
                    placement: bottom
                    showLegend: true
                  tooltip:
                    hideZeros: false
                    mode: single
                    sort: none
              version: 13.0.1+security-01
        panel-3:
          kind: Panel
          spec:
            data:
              kind: QueryGroup
              spec:
                queries:
                  - kind: PanelQuery
                    spec:
                      hidden: false
                      query:
                        datasource:
                          name: prometheus
                        group: prometheus
                        kind: DataQuery
                        spec:
                          editorMode: code
                          expr: sum by(pod) (container_memory_rss{namespace="bluesbrackets"})
                          legendFormat: '{{pod}}'
                          range: true
                        version: v0
                      refId: A
                  - kind: PanelQuery
                    spec:
                      hidden: false
                      query:
                        datasource:
                          name: prometheus
                        group: prometheus
                        kind: DataQuery
                        spec:
                          editorMode: code
                          expr: |-
                            min (
                              kube_pod_container_resource_limits{
                                namespace="bluesbrackets",
                                resource="memory",
                                container!="",
                                pod=~"bluesbrackets.*"
                              }
                            )
                          instant: false
                          legendFormat: Limit
                          range: true
                        version: v0
                      refId: B
                  - kind: PanelQuery
                    spec:
                      hidden: false
                      query:
                        datasource:
                          name: prometheus
                        group: prometheus
                        kind: DataQuery
                        spec:
                          editorMode: code
                          expr: |-
                            min (
                              kube_pod_container_resource_requests{
                                namespace="bluesbrackets",
                                resource="memory",
                                container!="",
                                pod=~"bluesbrackets.*"
                              }
                            )
                          instant: false
                          legendFormat: Requests
                          range: true
                        version: v0
                      refId: C
                queryOptions: {}
                transformations: []
            description: ''
            id: 3
            links: []
            title: Memory usage by pod
            vizConfig:
              group: timeseries
              kind: VizConfig
              spec:
                fieldConfig:
                  defaults:
                    color:
                      mode: palette-classic
                    custom:
                      axisBorderShow: false
                      axisCenteredZero: false
                      axisColorMode: text
                      axisLabel: ''
                      axisPlacement: auto
                      barAlignment: 0
                      barWidthFactor: 0.6
                      drawStyle: line
                      fillOpacity: 0
                      gradientMode: none
                      hideFrom:
                        legend: false
                        tooltip: false
                        viz: false
                      insertNulls: false
                      lineInterpolation: linear
                      lineWidth: 1
                      pointSize: 5
                      scaleDistribution:
                        type: linear
                      showPoints: auto
                      showValues: false
                      spanNulls: false
                      stacking:
                        group: A
                        mode: none
                      thresholdsStyle:
                        mode: 'off'
                    thresholds:
                      mode: absolute
                      steps:
                        - color: green
                          value: 0
                        - color: red
                          value: 80
                        - color: '#EAB839'
                          value: 90
                    unit: decbytes
                  overrides: []
                options:
                  annotations:
                    clustering: -1
                    multiLane: false
                  legend:
                    calcs: []
                    displayMode: list
                    placement: bottom
                    showLegend: true
                  tooltip:
                    hideZeros: false
                    mode: single
                    sort: none
              version: 13.0.1+security-01
        panel-4:
          kind: Panel
          spec:
            data:
              kind: QueryGroup
              spec:
                queries:
                  - kind: PanelQuery
                    spec:
                      hidden: false
                      query:
                        datasource:
                          name: prometheus
                        group: prometheus
                        kind: DataQuery
                        spec:
                          editorMode: code
                          expr: |-
                            histogram_quantile(
                              0.50,
                              sum by (le) (
                                rate(traefik_service_request_duration_seconds_bucket{protocol="http", service="bluesbrackets-bluesbrackets-80@kubernetes"}[$__rate_interval])
                              )
                            )
                          legendFormat: p50
                          range: true
                        version: v0
                      refId: A
                  - kind: PanelQuery
                    spec:
                      hidden: false
                      query:
                        datasource:
                          name: prometheus
                        group: prometheus
                        kind: DataQuery
                        spec:
                          editorMode: code
                          expr: |-
                            histogram_quantile(
                              0.90,
                              sum by (le) (
                                rate(traefik_service_request_duration_seconds_bucket{protocol="http", service="bluesbrackets-bluesbrackets-80@kubernetes"}[$__rate_interval])
                              )
                            )
                          instant: false
                          legendFormat: p90
                          range: true
                        version: v0
                      refId: B
                  - kind: PanelQuery
                    spec:
                      hidden: false
                      query:
                        datasource:
                          name: prometheus
                        group: prometheus
                        kind: DataQuery
                        spec:
                          editorMode: code
                          expr: |-
                            histogram_quantile(
                              0.99,
                              sum by (le) (
                                rate(traefik_service_request_duration_seconds_bucket{protocol="http", service="bluesbrackets-bluesbrackets-80@kubernetes"}[$__rate_interval])
                              )
                            )
                          instant: false
                          legendFormat: p99
                          range: true
                        version: v0
                      refId: C
                queryOptions: {}
                transformations: []
            description: ''
            id: 4
            links: []
            title: Response time percentiles
            vizConfig:
              group: timeseries
              kind: VizConfig
              spec:
                fieldConfig:
                  defaults:
                    color:
                      mode: palette-classic
                    custom:
                      axisBorderShow: false
                      axisCenteredZero: false
                      axisColorMode: text
                      axisLabel: ''
                      axisPlacement: auto
                      barAlignment: 0
                      barWidthFactor: 0.6
                      drawStyle: line
                      fillOpacity: 0
                      gradientMode: none
                      hideFrom:
                        legend: false
                        tooltip: false
                        viz: false
                      insertNulls: false
                      lineInterpolation: linear
                      lineWidth: 1
                      pointSize: 5
                      scaleDistribution:
                        type: linear
                      showPoints: auto
                      showValues: false
                      spanNulls: false
                      stacking:
                        group: A
                        mode: none
                      thresholdsStyle:
                        mode: 'off'
                    thresholds:
                      mode: absolute
                      steps:
                        - color: green
                          value: 0
                        - color: red
                          value: 80
                    unit: s
                  overrides: []
                options:
                  annotations:
                    clustering: -1
                    multiLane: false
                  legend:
                    calcs: []
                    displayMode: list
                    placement: bottom
                    showLegend: true
                  tooltip:
                    hideZeros: false
                    mode: single
                    sort: none
              version: 13.0.1+security-01
      layout:
        kind: AutoGridLayout
        spec:
          columnWidthMode: standard
          items:
            - kind: AutoGridLayoutItem
              spec:
                element:
                  kind: ElementReference
                  name: panel-1
            - kind: AutoGridLayoutItem
              spec:
                element:
                  kind: ElementReference
                  name: panel-4
            - kind: AutoGridLayoutItem
              spec:
                element:
                  kind: ElementReference
                  name: panel-2
            - kind: AutoGridLayoutItem
              spec:
                element:
                  kind: ElementReference
                  name: panel-3
          maxColumnCount: 2
          rowHeightMode: standard
      links: []
      liveNow: false
      preferences:
        layout:
          kind: AutoGridLayout
          spec:
            columnWidthMode: standard
            items: []
            maxColumnCount: 3
            rowHeightMode: standard
      preload: false
      tags: []
      timeSettings:
        autoRefresh: ''
        autoRefreshIntervals:
          - 5s
          - 10s
          - 30s
          - 1m
          - 5m
          - 15m
          - 30m
          - 1h
          - 2h
          - 1d
        fiscalYearStartMonth: 0
        from: now-6h
        hideTimepicker: false
        timezone: browser
        to: now
      title: bluesbrackets.com
      variables: []
