                      "group": "prometheus",
                      "kind": "DataQuery",
                      "spec": {
                        "editorMode": "code",
                        "expr": "min (\n  kube_pod_container_resource_requests{\n    namespace=\"bluesbrackets\",\n    resource=\"cpu\",\n    container!=\"\",\n    pod=~\".*bluesbrackets.*\"\n  }\n)",
                        "instant": false,
                        "legendFormat": "{{pod}} requests",
                        "range": true
