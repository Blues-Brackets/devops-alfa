apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: qrly-pr
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  generators:
    - pullRequest:
        requeueAfterSeconds: 60
        github:
          owner: Blues-Brackets
          repo: qrly
          tokenRef:
            secretName: qrly-github-token
            key: token
          labels:
            - preview
  template:
    metadata:
      name: qrly-pr-{{number}}
    spec:
      project: default
      source:
        repoURL: git@github.com:Blues-Brackets/qrly.git
        targetRevision: "{{head_sha}}"
        path: helm/qrly
        helm:
          releaseName: qrly-pr-{{number}}
          valuesObject:
            imageTag: "pr-{{number}}"
            imagePullSecrets: ghcr-credentials
            postgres:
              enabled: true
              auth:
                username: postgres
                password: ""
                database: qrly
              persistence:
                size: 2Gi
            database:
              existingSecret: ""
              existingSecretKey: ""
            ingress:
              enabled: true
              className: traefik
              annotations:
                traefik.ingress.kubernetes.io/router.entrypoints: websecure
                cert-manager.io/cluster-issuer: letsencrypt-prod
              hosts:
                - host: qrly-pr-{{number}}.alfa.bluesbrackets.com
                  paths:
                    - path: /
                      pathType: Prefix
              tls:
                - secretName: api-pr-{{number}}-tls
                  hosts:
                    - qrly-pr-{{number}}.alfa.bluesbrackets.com
            landing:
              replicaCount: 1
      destination:
        server: https://kubernetes.default.svc
        namespace: qrly
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
