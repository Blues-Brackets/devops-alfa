apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaManifest
metadata:
  name: dashboard-czeq-overview
  namespace: observability
spec:
  instanceSelector:
    matchLabels:
      dashboards: "kube-prometheus-grafana"
  template:
    apiVersion: dashboard.grafana.app/v2beta1
    kind: Dashboard
    metadata:
      name: dashboard-czeq-overview
      annotations:
        grafana.app/folder: czeq
    spec:
      cursorSync: "Off"
      editable: true
      elements:
        panel-1:
          kind: Panel
          spec:
            data:
              kind: QueryGroup
              spec:
                queries:
                  - kind: PanelQuery
                    spec:
                      hidden: false
                      query:
                        datasource:
                          name: prometheus
                        group: prometheus
                        kind: DataQuery
                        spec:
                          editorMode: code
                          expr: |-
                            sum by (code_bucket, service) (
                              label_replace(
                                rate(traefik_service_requests_total{service=~"czeq-czeq-pr-[0-9]+-(backend|cms)-3000@kubernetes"}[$__rate_interval]),
                                "code_bucket",
                                "${1}xx",
                                "code",
                                "([1-5])[0-9][0-9]"
                              )
                            )
                          interval: 1m
                          legendFormat: "{{service}} {{code_bucket}}"
                          range: true
                        version: v0
                      refId: A
                queryOptions: {}
                transformations: []
            description: ""
            id: 1
            links: []
            title: Traffic RPM
            vizConfig:
              group: timeseries
              kind: VizConfig
              spec:
                fieldConfig:
                  defaults:
                    color:
                      mode: palette-classic
                    custom:
                      drawStyle: line
                      fillOpacity: 0
                      lineWidth: 1
                      pointSize: 5
                      showPoints: auto
                      spanNulls: false
                    thresholds:
                      mode: absolute
                      steps:
                        - color: green
                          value: 0
                        - color: red
                          value: 80
                  overrides: []
                options:
                  legend:
                    calcs: []
                    displayMode: list
                    placement: bottom
                    showLegend: true
                  tooltip:
                    mode: single
                    sort: none
              version: 13.0.1+security-01
        panel-2:
          kind: Panel
          spec:
            data:
              kind: QueryGroup
              spec:
                queries:
                  - kind: PanelQuery
                    spec:
                      hidden: false
                      query:
                        datasource:
                          name: prometheus
                        group: prometheus
                        kind: DataQuery
                        spec:
                          editorMode: code
                          expr: |-
                            sum by (pod) (
                              rate(container_cpu_usage_seconds_total{
                                namespace="czeq",
                                container!=""
                              }[$__rate_interval])
                            )
                          legendFormat: "{{pod}}"
                          range: true
                        version: v0
                      refId: A
                  - kind: PanelQuery
                    spec:
                      hidden: false
                      query:
                        datasource:
                          name: prometheus
                        group: prometheus
                        kind: DataQuery
                        spec:
                          editorMode: code
                          expr: |-
                            min by (pod) (
                              kube_pod_container_resource_limits{
                                namespace="czeq",
                                resource="cpu",
                                container!=""
                              }
                            )
                          legendFormat: "{{pod}} limit"
                          range: true
                        version: v0
                      refId: B
                  - kind: PanelQuery
                    spec:
                      hidden: false
                      query:
                        datasource:
                          name: prometheus
                        group: prometheus
                        kind: DataQuery
                        spec:
                          editorMode: code
                          expr: |-
                            min by (pod) (
                              kube_pod_container_resource_requests{
                                namespace="czeq",
                                resource="cpu",
                                container!=""
                              }
                            )
                          legendFormat: "{{pod}} request"
                          range: true
                        version: v0
                      refId: C
                queryOptions: {}
                transformations: []
            description: ""
            id: 2
            links: []
            title: CPU usage by pod
            vizConfig:
              group: timeseries
              kind: VizConfig
              spec:
                fieldConfig:
                  defaults:
                    color:
                      mode: palette-classic
                    custom:
                      drawStyle: line
                      fillOpacity: 0
                      lineWidth: 1
                      pointSize: 5
                      showPoints: auto
                      spanNulls: false
                    thresholds:
                      mode: absolute
                      steps:
                        - color: green
                          value: 0
                        - color: red
                          value: 80
                  overrides: []
                options:
                  legend:
                    calcs: []
                    displayMode: list
                    placement: bottom
                    showLegend: true
                  tooltip:
                    mode: single
                    sort: none
              version: 13.0.1+security-01
        panel-3:
          kind: Panel
          spec:
            data:
              kind: QueryGroup
              spec:
                queries:
                  - kind: PanelQuery
                    spec:
                      hidden: false
                      query:
                        datasource:
                          name: prometheus
                        group: prometheus
                        kind: DataQuery
                        spec:
                          editorMode: code
                          expr: sum by (pod) (container_memory_working_set_bytes{namespace="czeq", container!=""})
                          legendFormat: "{{pod}}"
                          range: true
                        version: v0
                      refId: A
                  - kind: PanelQuery
                    spec:
                      hidden: false
                      query:
                        datasource:
                          name: prometheus
                        group: prometheus
                        kind: DataQuery
                        spec:
                          editorMode: code
                          expr: |-
                            min by (pod) (
                              kube_pod_container_resource_limits{
                                namespace="czeq",
                                resource="memory",
                                container!=""
                              }
                            )
                          legendFormat: "{{pod}} limit"
                          range: true
                        version: v0
                      refId: B
                  - kind: PanelQuery
                    spec:
                      hidden: false
                      query:
                        datasource:
                          name: prometheus
                        group: prometheus
                        kind: DataQuery
                        spec:
                          editorMode: code
                          expr: |-
                            min by (pod) (
                              kube_pod_container_resource_requests{
                                namespace="czeq",
                                resource="memory",
                                container!=""
                              }
                            )
                          legendFormat: "{{pod}} request"
                          range: true
                        version: v0
                      refId: C
                queryOptions: {}
                transformations: []
            description: ""
            id: 3
            links: []
            title: Memory usage by pod
            vizConfig:
              group: timeseries
              kind: VizConfig
              spec:
                fieldConfig:
                  defaults:
                    color:
                      mode: palette-classic
                    custom:
                      drawStyle: line
                      fillOpacity: 0
                      lineWidth: 1
                      pointSize: 5
                      showPoints: auto
                      spanNulls: false
                    unit: decbytes
                    thresholds:
                      mode: absolute
                      steps:
                        - color: green
                          value: 0
                        - color: red
                          value: 80
                  overrides: []
                options:
                  legend:
                    calcs: []
                    displayMode: list
                    placement: bottom
                    showLegend: true
                  tooltip:
                    mode: single
                    sort: none
              version: 13.0.1+security-01
        panel-4:
          kind: Panel
          spec:
            data:
              kind: QueryGroup
              spec:
                queries:
                  - kind: PanelQuery
                    spec:
                      hidden: false
                      query:
                        datasource:
                          name: prometheus
                        group: prometheus
                        kind: DataQuery
                        spec:
                          editorMode: code
                          expr: |-
                            histogram_quantile(
                              0.50,
                              sum by (le, service) (
                                rate(traefik_service_request_duration_seconds_bucket{service=~"czeq-czeq-pr-[0-9]+-(backend|cms)-3000@kubernetes"}[$__rate_interval])
                              )
                            )
                          legendFormat: "{{service}} p50"
                          range: true
                        version: v0
                      refId: A
                  - kind: PanelQuery
                    spec:
                      hidden: false
                      query:
                        datasource:
                          name: prometheus
                        group: prometheus
                        kind: DataQuery
                        spec:
                          editorMode: code
                          expr: |-
                            histogram_quantile(
                              0.90,
                              sum by (le, service) (
                                rate(traefik_service_request_duration_seconds_bucket{service=~"czeq-czeq-pr-[0-9]+-(backend|cms)-3000@kubernetes"}[$__rate_interval])
                              )
                            )
                          legendFormat: "{{service}} p90"
                          range: true
                        version: v0
                      refId: B
                  - kind: PanelQuery
                    spec:
                      hidden: false
                      query:
                        datasource:
                          name: prometheus
                        group: prometheus
                        kind: DataQuery
                        spec:
                          editorMode: code
                          expr: |-
                            histogram_quantile(
                              0.99,
                              sum by (le, service) (
                                rate(traefik_service_request_duration_seconds_bucket{service=~"czeq-czeq-pr-[0-9]+-(backend|cms)-3000@kubernetes"}[$__rate_interval])
                              )
                            )
                          legendFormat: "{{service}} p99"
                          range: true
                        version: v0
                      refId: C
                queryOptions: {}
                transformations: []
            description: ""
            id: 4
            links: []
            title: Response time percentiles
            vizConfig:
              group: timeseries
              kind: VizConfig
              spec:
                fieldConfig:
                  defaults:
                    color:
                      mode: palette-classic
                    custom:
                      drawStyle: line
                      fillOpacity: 0
                      lineWidth: 1
                      pointSize: 5
                      showPoints: auto
                      spanNulls: false
                    unit: s
                    thresholds:
                      mode: absolute
                      steps:
                        - color: green
                          value: 0
                        - color: red
                          value: 80
                  overrides: []
                options:
                  legend:
                    calcs: []
                    displayMode: list
                    placement: bottom
                    showLegend: true
                  tooltip:
                    mode: single
                    sort: none
              version: 13.0.1+security-01
        panel-5:
          kind: Panel
          spec:
            data:
              kind: QueryGroup
              spec:
                queries:
                  - kind: PanelQuery
                    spec:
                      hidden: false
                      query:
                        datasource:
                          name: prometheus
                        group: prometheus
                        kind: DataQuery
                        spec:
                          editorMode: code
                          expr: |-
                            (1 - node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100
                          legendFormat: "Node disk usage (%)"
                          range: true
                        version: v0
                      refId: A
                queryOptions: {}
                transformations: []
            description: ""
            id: 5
            links: []
            title: Node disk usage (%)
            vizConfig:
              group: timeseries
              kind: VizConfig
              spec:
                fieldConfig:
                  defaults:
                    color:
                      mode: palette-classic
                    custom:
                      drawStyle: line
                      fillOpacity: 10
                      lineWidth: 1
                      pointSize: 5
                      showPoints: auto
                      spanNulls: false
                    unit: percent
                    min: 0
                    max: 100
                    thresholds:
                      mode: absolute
                      steps:
                        - color: green
                          value: 0
                        - color: yellow
                          value: 70
                        - color: red
                          value: 85
                  overrides: []
                options:
                  legend:
                    calcs: []
                    displayMode: list
                    placement: bottom
                    showLegend: true
                  tooltip:
                    mode: single
                    sort: none
              version: 13.0.1+security-01
      layout:
        kind: AutoGridLayout
        spec:
          columnWidthMode: standard
          items:
            - kind: AutoGridLayoutItem
              spec:
                element:
                  kind: ElementReference
                  name: panel-1
            - kind: AutoGridLayoutItem
              spec:
                element:
                  kind: ElementReference
                  name: panel-4
            - kind: AutoGridLayoutItem
              spec:
                element:
                  kind: ElementReference
                  name: panel-2
            - kind: AutoGridLayoutItem
              spec:
                element:
                  kind: ElementReference
                  name: panel-3
            - kind: AutoGridLayoutItem
              spec:
                element:
                  kind: ElementReference
                  name: panel-5
          maxColumnCount: 2
          rowHeightMode: standard
      links: []
      liveNow: false
      preload: false
      tags: []
      timeSettings:
        autoRefresh: ""
        autoRefreshIntervals:
          - 5s
          - 10s
          - 30s
          - 1m
          - 5m
          - 15m
          - 30m
          - 1h
        from: now-3h
        to: now
      title: Czeq Overview
