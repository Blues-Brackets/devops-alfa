apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 24-grafana-dashboards
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Blues-Brackets/devops-alfa.git
    targetRevision: HEAD
    path: gitops/apps/monitoring/grafana-resources
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
