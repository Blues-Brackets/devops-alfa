apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: app-alerts
  namespace: observability
  labels:
    # Kube-prometheus-stack domyślnie zbiera reguły z etykietą app: kube-prometheus-stack
    app: kube-prometheus-stack
    release: kube-prometheus-stack
spec:
  groups:
    - name: apps.pod
      interval: 1m
      rules:
        - alert: PodCrashLooping
          expr: increase(kube_pod_container_status_restarts_total{namespace!~"kube-system|kube-public|argocd|observability"}[15m]) > 3
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod crash looping: {{ $labels.namespace }}/{{ $labels.pod }}"
            description: "Pod {{ $labels.pod }} ({{ $labels.container }}) w namespace {{ $labels.namespace }} zrestartował się {{ $value | humanize }} razy w ciągu 15 min."

        - alert: PodNotReady
          expr: |
            kube_pod_status_ready{condition="false", namespace!~"kube-system|kube-public|argocd|observability"} == 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Pod nie jest gotowy: {{ $labels.namespace }}/{{ $labels.pod }}"
            description: "Pod {{ $labels.pod }} w namespace {{ $labels.namespace }} nie jest w stanie Ready od ponad 10 minut."

        - alert: PodOOMKilled
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace!~"kube-system|kube-public|argocd|observability"}[5m]) > 0
            and on(namespace, pod, container)
            kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "OOMKilled: {{ $labels.namespace }}/{{ $labels.pod }}"
            description: "Kontener {{ $labels.container }} w podzie {{ $labels.pod }} ({{ $labels.namespace }}) został zabity przez OOM killer."

        - alert: DeploymentUnavailable
          expr: |
            kube_deployment_status_replicas_unavailable{namespace!~"kube-system|kube-public|argocd|observability"} > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Deployment ma niedostępne repliki: {{ $labels.namespace }}/{{ $labels.deployment }}"
            description: "Deployment {{ $labels.deployment }} w {{ $labels.namespace }} ma {{ $value }} niedostępnych replik od ponad 5 minut."

    - name: apps.ingress
      interval: 1m
      rules:
        - alert: HighIngressErrorRate
          expr: |
            (
              sum(rate(nginx_ingress_controller_requests{status=~"5.*"}[5m])) by (ingress, namespace)
              /
              sum(rate(nginx_ingress_controller_requests[5m])) by (ingress, namespace)
            ) > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Wysoki wskaźnik błędów 5xx: {{ $labels.namespace }}/{{ $labels.ingress }}"
            description: "Ingress {{ $labels.ingress }} ({{ $labels.namespace }}) ma {{ $value | humanizePercentage }} błędów 5xx."

        - alert: IngressHighLatency
          expr: |
            histogram_quantile(0.95,
              sum(rate(nginx_ingress_controller_request_duration_seconds_bucket[5m])) by (le, ingress, namespace)
            ) > 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Wysoka latencja p95: {{ $labels.namespace }}/{{ $labels.ingress }}"
            description: "Ingress {{ $labels.ingress }} ({{ $labels.namespace }}) ma latencję p95 = {{ $value | humanizeDuration }}."

    - name: apps.resources
      interval: 2m
      rules:
        - alert: HighMemoryUsage
          expr: |
            (
              sum(container_memory_working_set_bytes{container!="", namespace!~"kube-system|kube-public|argocd|observability"}) by (namespace, pod)
              /
              sum(kube_pod_container_resource_limits{resource="memory", namespace!~"kube-system|kube-public|argocd|observability"}) by (namespace, pod)
            ) > 0.9
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Wysokie zużycie pamięci: {{ $labels.namespace }}/{{ $labels.pod }}"
            description: "Pod {{ $labels.pod }} w {{ $labels.namespace }} używa {{ $value | humanizePercentage }} limitu pamięci."

        - alert: HighCpuThrottling
          expr: |
            rate(container_cpu_cfs_throttled_seconds_total{container!="", namespace!~"kube-system|kube-public|argocd|observability"}[5m])
            /
            rate(container_cpu_cfs_periods_total{container!="", namespace!~"kube-system|kube-public|argocd|observability"}[5m])
            > 0.25
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "CPU throttling: {{ $labels.namespace }}/{{ $labels.pod }}"
            description: "Kontener {{ $labels.container }} w {{ $labels.namespace }}/{{ $labels.pod }} jest throttlowany przez {{ $value | humanizePercentage }} czasu."
