apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: dashboard-traefik-ingress
  namespace: observability
spec:
  instanceSelector:
    matchLabels:
      dashboards: "kube-prometheus-grafana"
  folder: "Applications"
  json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 1,
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "unit": "reqps" },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "id": 1,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(rate(traefik_service_requests_total{service=~\"$service\"}[5m])) by (service)",
              "legendFormat": "{{service}}",
              "refId": "A"
            }
          ],
          "title": "Request Rate by Service",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "unit": "reqps" },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "id": 2,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(rate(traefik_service_requests_total{code=~\"4..|5..\", service=~\"$service\"}[5m])) by (service, code)",
              "legendFormat": "{{service}} [{{code}}]",
              "refId": "A"
            }
          ],
          "title": "Error Rate (4xx / 5xx)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "unit": "s" },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "id": 3,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "histogram_quantile(0.95, sum(rate(traefik_service_request_duration_seconds_bucket{service=~\"$service\"}[5m])) by (le, service))",
              "legendFormat": "p95 {{service}}",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "histogram_quantile(0.99, sum(rate(traefik_service_request_duration_seconds_bucket{service=~\"$service\"}[5m])) by (le, service))",
              "legendFormat": "p99 {{service}}",
              "refId": "B"
            }
          ],
          "title": "Request Latency p95 / p99",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "unit": "Bps" },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "id": 4,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(rate(traefik_service_requests_bytes_total{service=~\"$service\"}[5m])) by (service)",
              "legendFormat": "IN {{service}}",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(rate(traefik_service_responses_bytes_total{service=~\"$service\"}[5m])) by (service)",
              "legendFormat": "OUT {{service}}",
              "refId": "B"
            }
          ],
          "title": "Bandwidth In / Out",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "unit": "short" },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "id": 5,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "traefik_open_connections{entrypoint=~\"web|websecure\"}",
              "legendFormat": "{{entrypoint}} ({{protocol}})",
              "refId": "A"
            }
          ],
          "title": "Open Connections",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "unit": "short" },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "id": 6,
          "options": {
            "legend": { "calcs": ["last"], "displayMode": "table", "placement": "bottom" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(rate(traefik_entrypoint_requests_total{entrypoint=~\"web|websecure\"}[5m])) by (entrypoint, code)",
              "legendFormat": "{{entrypoint}} [{{code}}]",
              "refId": "A"
            }
          ],
          "title": "Entrypoint Request Rate (web / websecure)",
          "type": "timeseries"
        }
      ],
      "templating": {
        "list": [
          {
            "current": {},
            "hide": 0,
            "includeAll": false,
            "label": "Datasource",
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "type": "datasource"
          },
          {
            "current": { "selected": true, "text": "All", "value": "$__all" },
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "definition": "label_values(traefik_service_requests_total{service=~\".+@kubernetes\"}, service)",
            "hide": 0,
            "includeAll": true,
            "label": "Service",
            "multi": true,
            "name": "service",
            "options": [],
            "query": {
              "query": "label_values(traefik_service_requests_total{service=~\".+@kubernetes\"}, service)",
              "refId": "StandardVariableQuery"
            },
            "refresh": 2,
            "sort": 1,
            "type": "query"
          }
        ]
      },
      "time": { "from": "now-3h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Traefik Ingress Traffic",
      "uid": "traefik-traffic-v1",
      "version": 1
    }
