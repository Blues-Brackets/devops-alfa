apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bluesbrackets-base
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Blues-Brackets/devops-alfa.git
    targetRevision: HEAD
    path: gitops/apps/bluesbrackets
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
